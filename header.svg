<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1d4ed8"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ln { stroke: rgba(255,255,255,0.35); stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
      .a1 { animation: dash 4s linear infinite; }
      .a2 { animation: dash 6s linear infinite; animation-delay: -2s; }
      .a3 { animation: dash 5s linear infinite; animation-delay: -1s; }
      @keyframes dash { to { stroke-dashoffset: -200; } }
      .nd { fill: rgba(255,255,255,0.8); }
      .p1 { animation: pulse 3s ease-in-out infinite; }
      .p2 { animation: pulse 3s ease-in-out infinite; animation-delay: -1s; }
      .p3 { animation: pulse 3s ease-in-out infinite; animation-delay: -2s; }
      @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- Left network lines -->
  <line class="ln a1" x1="35"  y1="75"  x2="130" y2="155"/>
  <line class="ln a2" x1="130" y1="155" x2="205" y2="65"/>
  <line class="ln a3" x1="205" y1="65"  x2="35"  y2="75"/>
  <line class="ln a1" x1="130" y1="155" x2="75"  y2="245"/>
  <line class="ln a2" x1="75"  y1="245" x2="205" y2="65"/>
  <line class="ln a3" x1="205" y1="65"  x2="295" y2="115"/>
  <line class="ln a1" x1="35"  y1="75"  x2="75"  y2="245"/>
  <line class="ln a2" x1="295" y1="115" x2="255" y2="235"/>
  <line class="ln a3" x1="75"  y1="245" x2="255" y2="235"/>
  <line class="ln a1" x1="255" y1="235" x2="350" y2="200"/>
  <line class="ln a2" x1="295" y1="115" x2="350" y2="200"/>

  <!-- Left nodes -->
  <circle class="nd p1" cx="35"  cy="75"  r="4"/>
  <circle class="nd p2" cx="130" cy="155" r="5"/>
  <circle class="nd p3" cx="205" cy="65"  r="4"/>
  <circle class="nd p1" cx="75"  cy="245" r="3"/>
  <circle class="nd p2" cx="295" cy="115" r="4"/>
  <circle class="nd p3" cx="255" cy="235" r="3"/>
  <circle class="nd p1" cx="350" cy="200" r="3"/>

  <!-- Right network lines -->
  <line class="ln a2" x1="1165" y1="75"  x2="1070" y2="155"/>
  <line class="ln a1" x1="1070" y1="155" x2="995"  y2="65"/>
  <line class="ln a3" x1="995"  y1="65"  x2="1165" y2="75"/>
  <line class="ln a2" x1="1070" y1="155" x2="1125" y2="245"/>
  <line class="ln a1" x1="1125" y1="245" x2="995"  y2="65"/>
  <line class="ln a3" x1="995"  y1="65"  x2="905"  y2="115"/>
  <line class="ln a2" x1="1165" y1="75"  x2="1125" y2="245"/>
  <line class="ln a1" x1="905"  y1="115" x2="945"  y2="235"/>
  <line class="ln a3" x1="1125" y1="245" x2="945"  y2="235"/>
  <line class="ln a2" x1="945"  y1="235" x2="850"  y2="200"/>
  <line class="ln a1" x1="905"  y1="115" x2="850"  y2="200"/>

  <!-- Right nodes -->
  <circle class="nd p2" cx="1165" cy="75"  r="4"/>
  <circle class="nd p1" cx="1070" cy="155" r="5"/>
  <circle class="nd p3" cx="995"  cy="65"  r="4"/>
  <circle class="nd p2" cx="1125" cy="245" r="3"/>
  <circle class="nd p1" cx="905"  cy="115" r="4"/>
  <circle class="nd p3" cx="945"  cy="235" r="3"/>
  <circle class="nd p2" cx="850"  cy="200" r="3"/>

  <!-- Name -->
  <text x="600" y="158"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="66"
        fill="#ffffff"
        text-anchor="middle">Furkan Akkamış</text>

  <!-- Title -->
  <text x="600" y="205"
        font-family="Courier New, monospace"
        font-size="19"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="9"
        text-anchor="middle">DEVOPS &amp; CLOUD ENGINEER</text>
</svg>
