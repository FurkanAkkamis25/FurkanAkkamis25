<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d2137"/>
      <stop offset="50%"  stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#00acc1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="70"  x2="1200" y2="70"  stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Accent bar above name -->
  <rect x="510" y="100" width="180" height="3" rx="2" fill="rgba(255,255,255,0.45)"/>

  <!-- Name -->
  <text x="600" y="158"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="68"
        fill="#ffffff"
        text-anchor="middle">Furkan Akkamış</text>

  <!-- Title -->
  <text x="600" y="200"
        font-family="Courier New, monospace"
        font-size="18"
        fill="#b2ebf2"
        letter-spacing="10"
        text-anchor="middle">DEVOPS &amp; CLOUD ENGINEER</text>

  <!-- Accent bar below title -->
  <rect x="510" y="216" width="180" height="3" rx="2" fill="rgba(255,255,255,0.45)"/>
</svg>
